<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960">
  <!-- Window frame -->
  <rect x="180" y="120" width="600" height="720" rx="20" fill="none" stroke="#4A90D9" stroke-width="40"/>
  <!-- Shade (rolled down partially) -->
  <rect x="220" y="160" width="520" height="350" fill="#4A90D9" opacity="0.8"/>
  <!-- Shade bottom roller bar -->
  <rect x="220" y="490" width="520" height="40" rx="20" fill="#4A90D9"/>
  <!-- Pull cord -->
  <line x1="480" y1="530" x2="480" y2="700" stroke="#4A90D9" stroke-width="12" stroke-linecap="round"/>
  <circle cx="480" cy="720" r="20" fill="#4A90D9"/>
</svg>
