<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <!-- Radio wave arcs -->
  <g transform="translate(500, 300)" stroke="#4A90D9" fill="none" stroke-linecap="round">
    <path d="M-60,0 A60,60 0 0,1 60,0" stroke-width="28" opacity="0.5" />
    <path d="M-120,-15 A120,120 0 0,1 120,-15" stroke-width="24" opacity="0.7" />
    <path d="M-185,-30 A185,185 0 0,1 185,-30" stroke-width="20" opacity="0.9" />
  </g>

  <!-- RA2 text -->
  <text x="500" y="650" text-anchor="middle" fill="#4A90D9"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="360" font-weight="800" letter-spacing="10">RA2</text>

  <!-- Underline accent -->
  <rect x="220" y="720" width="560" height="12" rx="6" fill="#4A90D9" opacity="0.5" />
</svg>
